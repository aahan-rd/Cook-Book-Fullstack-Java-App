name: CI — Build and Test
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Build and Test
    runs-on: khoury-course-runners
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Install JavaFX native dependencies
        run: |
          sudo apt-get update || apt-get update
          sudo apt-get install -y \
            libfreetype6 \
            libfontconfig1 \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libcairo2 \
            libgtk-3-0 \
            libgdk-pixbuf2.0-0 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxtst6 \
            libxrender1 \
            libxinerama1 \
            libgl1 || \
          apt-get install -y \
            libfreetype6 \
            libfontconfig1 \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libcairo2 \
            libgtk-3-0 \
            libgdk-pixbuf2.0-0 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxtst6 \
            libxrender1 \
            libxinerama1 \
            libgl1
      - name: Run tests
        run: ./gradlew test
