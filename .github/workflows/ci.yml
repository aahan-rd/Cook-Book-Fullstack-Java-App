name: CI — Build and Test
on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  test:
    name: Build and Test
    runs-on: khoury-course-runners
    timeout-minutes: 12
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Install JavaFX native dependencies
        run: |
          sudo apt-get update || apt-get update
          sudo apt-get install -y \
            libfreetype6 \
            libfontconfig1 \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libcairo2 \
            libgtk-3-0 \
            libgdk-pixbuf2.0-0 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxtst6 \
            libxrender1 \
            libxinerama1 \
            libgl1 || \
          apt-get install -y \
            libfreetype6 \
            libfontconfig1 \
            libpango-1.0-0 \
            libpangoft2-1.0-0 \
            libharfbuzz0b \
            libcairo2 \
            libgtk-3-0 \
            libgdk-pixbuf2.0-0 \
            libx11-xcb1 \
            libxcomposite1 \
            libxdamage1 \
            libxfixes3 \
            libxi6 \
            libxrandr2 \
            libxtst6 \
            libxrender1 \
            libxinerama1 \
            libgl1 || true

          if ! dpkg -s libgl1 >/dev/null 2>&1; then
            if command -v sudo >/dev/null 2>&1; then
              SUDO="sudo"
            else
              SUDO=""
            fi

            APT_FLAGS="-o Acquire::ForceIPv4=true -o Acquire::Retries=5"
            PKGS="
              libfreetype6
              libfontconfig1
              libpango-1.0-0
              libpangoft2-1.0-0
              libharfbuzz0b
              libcairo2
              libgtk-3-0
              libgdk-pixbuf2.0-0
              libx11-xcb1
              libxcomposite1
              libxdamage1
              libxfixes3
              libxi6
              libxrandr2
              libxtst6
              libxrender1
              libxinerama1
              libgl1
            "

            # Recover from interrupted package operations and retry with IPv4.
            $SUDO dpkg --configure -a || true
            $SUDO apt-get clean

            for attempt in 1 2 3; do
              $SUDO apt-get $APT_FLAGS update || true
              if $SUDO apt-get $APT_FLAGS install -y --fix-missing $PKGS; then
                break
              fi
              echo "apt retry attempt $attempt failed"
            done

            dpkg -s libgl1 >/dev/null 2>&1
          fi
      - name: Run tests
        run: ./gradlew test
